name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (Windows)
        shell: powershell
        run: |
          pyinstaller --clean --noconfirm --windowed `
            --name "pyflux" `
            --icon "assets/appicon.ico" `
            src/pyflux/main.py

      - name: Zip
        shell: powershell
        run: |
          cd dist
          $zipName = "pyflux-windows-x64.zip"
          Compress-Archive -Path "pyflux" -DestinationPath $zipName

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-windows-x64
          path: dist/pyflux-windows-x64.zip

  macos_x86_64:
    name: Build macOS x86_64 (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (Intel)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Create Intel venv + install deps (x86_64)
        shell: bash
        run: |
          arch -x86_64 python -m venv .venv-x86_64
          source .venv-x86_64/bin/activate

          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 pip install -r requirements.txt
          arch -x86_64 pip install pyinstaller

          arch -x86_64 python -c "import platform; print('python arch:', platform.machine())"

      - name: Build (x86_64)
        shell: bash
        run: |
          source .venv-x86_64/bin/activate
          arch -x86_64 pyinstaller --clean --noconfirm --windowed \
            --target-architecture x86_64 \
            --name "pyflux" \
            --icon "assets/appicon.icns" \
            src/pyflux/main.py

      - name: Zip
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-macos-x86_64
          path: dist/pyflux-macos-x86_64.zip

  macos_arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          python -c "import platform; print('python arch:', platform.machine())"

      - name: Build (arm64)
        shell: bash
        run: |
          pyinstaller --clean --noconfirm --windowed \
            --target-architecture arm64 \
            --name "pyflux" \
            --icon "assets/appicon.icns" \
            src/pyflux/main.py

      - name: Zip
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-macos-arm64
          path: dist/pyflux-macos-arm64.zip

  release:
    name: Create Release (only on tags)
    if: github.ref_type == 'tag'
    needs: [windows_x64, macos_x86_64, macos_arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload ZIPs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/**/*.zip
          generate_release_notes: true