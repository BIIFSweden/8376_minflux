name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build (Windows)
        shell: powershell
        run: |
          pyinstaller --clean --noconfirm --windowed `
            --name "pyflux" `
            --icon "assets/appicon.ico" `
            --collect-all PySide6 `
            --hidden-import PySide6.QtWebEngineCore `
            --hidden-import PySide6.QtWebEngineWidgets `
            --hidden-import PySide6.QtWebChannel `
            src/pyflux/main.py

      - name: Zip
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path "pyflux" -DestinationPath "pyflux-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-windows-x64
          path: dist/pyflux-windows-x64.zip

  macos_x86_64:
    name: Build macOS x86_64 (Intel)
    runs-on: macos-13   # Intel runner; macos-latest is now arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (Intel)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          python -c "import platform; print('python arch:', platform.machine())"

      - name: Build (x86_64)
        shell: bash
        run: |
          pyinstaller --clean --noconfirm --windowed \
            --target-architecture x86_64 \
            --name "pyflux" \
            --icon "assets/appicon.icns" \
            --osx-bundle-identifier com.yourname.pyflux \
            --collect-all PySide6 \
            --hidden-import PySide6.QtWebEngineCore \
            --hidden-import PySide6.QtWebEngineWidgets \
            --hidden-import PySide6.QtWebChannel \
            src/pyflux/main.py

      - name: Ad-hoc sign (deep)
        shell: bash
        run: |
          codesign --force --deep --sign - "dist/pyflux.app"

      - name: Zip
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-macos-x86_64
          path: dist/pyflux-macos-x86_64.zip

  macos_arm64:
    name: Build macOS arm64
    runs-on: macos-latest   # arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          python -c "import platform; print('python arch:', platform.machine())"

      - name: Build (arm64)
        shell: bash
        run: |
          pyinstaller --clean --noconfirm --windowed \
            --target-architecture arm64 \
            --name "pyflux" \
            --icon "assets/appicon.icns" \
            --osx-bundle-identifier com.yourname.pyflux \
            --collect-all PySide6 \
            --hidden-import PySide6.QtWebEngineCore \
            --hidden-import PySide6.QtWebEngineWidgets \
            --hidden-import PySide6.QtWebChannel \
            src/pyflux/main.py

      - name: Ad-hoc sign (deep)
        shell: bash
        run: |
          codesign --force --deep --sign - "dist/pyflux.app"

      - name: Verify QtWebEngineProcess is bundled
        shell: bash
        run: |
          ls "dist/pyflux.app/Contents/Frameworks/QtWebEngineCore.framework/Helpers/" || true
          ls "dist/pyflux.app/Contents/Frameworks/QtWebEngineCore.framework/Versions/A/Helpers/" || true

      - name: Zip
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-macos-arm64
          path: dist/pyflux-macos-arm64.zip

  release:
    name: Create Release (only on tags)
    if: github.ref_type == 'tag'
    needs: [windows_x64, macos_x86_64, macos_arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload ZIPs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/**/*.zip
          generate_release_notes: true