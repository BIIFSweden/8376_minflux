name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Setup Python 3.12 (x64)
        run: uv python install 3.12

      - name: Create venv & install deps
        shell: bash
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/Scripts/python.exe -r requirements.txt pyinstaller

      - name: Build (Windows)
        shell: powershell
        run: |
          .\.venv\Scripts\Activate.ps1
          pyinstaller --clean --noconfirm --windowed `
            --name "pyflux" `
            --icon "assets/appicon.ico" `
            --collect-all PySide6 `
            --hidden-import PySide6.QtWebEngineCore `
            --hidden-import PySide6.QtWebEngineWidgets `
            --hidden-import PySide6.QtWebChannel `
            src/pyflux/main.py

      - name: Zip
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path "pyflux" -DestinationPath "pyflux-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-windows-x64
          path: dist/pyflux-windows-x64.zip

  macos_x86_64:
      name: Build macOS x86_64 (Intel)
      runs-on: macos-latest   # arm64 host; we cross-build x86_64 via Rosetta
      steps:
        - uses: actions/checkout@v4

        - name: Install uv
          uses: astral-sh/setup-uv@v3
          with:
            enable-cache: true
            cache-dependency-glob: "requirements.txt"

        - name: Install x86_64 CPython 3.12 via uv
          shell: bash
          run: |
            # uv itself is arm64, but it can fetch an x86_64 Python build.
            uv python install cpython-3.12-macos-x86_64-none

        - name: Create x86_64 venv & install deps
          shell: bash
          run: |
            uv venv --python cpython-3.12-macos-x86_64-none .venv-x86_64

            # uv resolves wheels against the *target* interpreter, so this pulls x86_64 wheels.
            uv pip install --python .venv-x86_64/bin/python \
              -r requirements.txt pyinstaller

            # Sanity check — should print 'x86_64'
            .venv-x86_64/bin/python -c "import platform; print('python arch:', platform.machine())"

        - name: Build (x86_64)
          shell: bash
          run: |
            source .venv-x86_64/bin/activate
            # pyinstaller's shebang points to the x86_64 python, so macOS
            # auto-launches it under Rosetta. No `arch -x86_64` needed.
            pyinstaller --clean --noconfirm --windowed \
              --target-architecture x86_64 \
              --name "pyflux" \
              --icon "assets/appicon.icns" \
              --osx-bundle-identifier com.yourname.pyflux \
              --collect-all PySide6 \
              --hidden-import PySide6.QtWebEngineCore \
              --hidden-import PySide6.QtWebEngineWidgets \
              --hidden-import PySide6.QtWebChannel \
              src/pyflux/main.py

        - name: Ad-hoc sign (deep)
          run: codesign --force --deep --sign - "dist/pyflux.app"

        - name: Zip
          shell: bash
          run: |
            cd dist
            ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-x86_64.zip"

        - uses: actions/upload-artifact@v4
          with:
            name: pyflux-macos-x86_64
            path: dist/pyflux-macos-x86_64.zip

  macos_arm64:
    name: Build macOS arm64
    runs-on: macos-latest   # arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Setup Python 3.12
        run: uv python install 3.12

      - name: Create venv & install deps
        shell: bash
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -r requirements.txt pyinstaller
          .venv/bin/python -c "import platform; print('python arch:', platform.machine())"

      - name: Build (arm64)
        shell: bash
        run: |
          source .venv/bin/activate
          pyinstaller --clean --noconfirm --windowed \
            --target-architecture arm64 \
            --name "pyflux" \
            --icon "assets/appicon.icns" \
            --osx-bundle-identifier com.yourname.pyflux \
            --collect-all PySide6 \
            --hidden-import PySide6.QtWebEngineCore \
            --hidden-import PySide6.QtWebEngineWidgets \
            --hidden-import PySide6.QtWebChannel \
            src/pyflux/main.py

      - name: Ad-hoc sign (deep)
        run: codesign --force --deep --sign - "dist/pyflux.app"

      - name: Verify QtWebEngineProcess is bundled
        shell: bash
        run: |
          ls "dist/pyflux.app/Contents/Frameworks/QtWebEngineCore.framework/Helpers/" || true
          ls "dist/pyflux.app/Contents/Frameworks/QtWebEngineCore.framework/Versions/A/Helpers/" || true

      - name: Zip
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "pyflux.app" "pyflux-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pyflux-macos-arm64
          path: dist/pyflux-macos-arm64.zip

  release:
    name: Create Release (only on tags)
    if: github.ref_type == 'tag'
    needs: [windows_x64, macos_x86_64, macos_arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload ZIPs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/**/*.zip
          generate_release_notes: true